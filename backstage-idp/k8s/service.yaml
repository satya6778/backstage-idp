apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: default
spec:
  # NodePort exposes Backstage on the EC2 instance's public IP
  # Access via: http://<EC2-PUBLIC-IP>:7007
  type: NodePort
  selector:
    app: backstage
  ports:
    - protocol: TCP
      port: 7007          # Port inside the cluster
      targetPort: 7007    # Port the container listens on
      nodePort: 30007     # Port opened on the EC2 instance
